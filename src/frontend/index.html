<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>子弹价格闪电监视</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-card: #1c2128;
  --border: #30363d;
  --border-light: #3d444d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #656d76;
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-red: #f85149;
  --accent-orange: #d29922;
  --accent-purple: #bc8cff;
  --color-buy: #3fb950;
  --color-buy-bg: rgba(63,185,80,.12);
  --color-sell: #f0883e;
  --color-sell-bg: rgba(240,136,62,.12);
  --shadow: 0 2px 8px rgba(0,0,0,.3);
  --radius: 8px;
  --radius-lg: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow-x: hidden;
  user-select: none;
}

/* ===== Layout ===== */
.app { display: flex; flex-direction: column; height: 100vh; }

/* ===== Header ===== */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  -webkit-app-region: drag;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 22px; line-height: 1; }
.title-group { display: flex; flex-direction: column; }
.title { font-size: 15px; font-weight: 700; color: var(--accent-blue); }
.subtitle { font-size: 11px; color: var(--text-muted); letter-spacing: .5px; }
.status-badge {
  -webkit-app-region: no-drag;
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.status-badge .dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block;
}
.status-idle { background: var(--bg-tertiary); color: var(--text-secondary); }
.status-idle .dot { background: var(--text-muted); }
.status-running { background: rgba(63,185,80,.12); color: var(--accent-green); }
.status-running .dot { background: var(--accent-green); animation: pulse 1.5s infinite; }
.status-error { background: rgba(248,81,73,.12); color: var(--accent-red); }
.status-error .dot { background: var(--accent-red); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

/* ===== Toolbar ===== */
.toolbar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.btn {
  -webkit-app-region: no-drag;
  padding: 6px 14px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  transition: all .15s; background: var(--bg-tertiary); color: var(--text-primary);
}
.btn:hover { border-color: var(--border-light); background: var(--border); }
.btn:active { transform: scale(.97); }
.btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-primary:disabled { opacity: .5; cursor: default; }
.btn-danger { background: var(--accent-red); border-color: var(--accent-red); color: #fff; }
.btn-danger:hover { background: #da3633; }
.btn-warn { background: var(--accent-orange); border-color: var(--accent-orange); color: #fff; }
.btn-warn:hover { opacity: .9; }

.toolbar .separator { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

.input-group {
  display: flex; align-items: center; gap: 4px;
}
.input-group label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
.input-group input {
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 8px; color: var(--text-primary);
  font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px;
  width: 44px; text-align: center; outline: none;
}
.input-group input:focus { border-color: var(--accent-blue); }

.add-input {
  background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 10px; color: var(--text-primary);
  font-size: 12px; outline: none; width: 180px;
  font-family: 'Cascadia Code', 'Consolas', monospace;
}
.add-input:focus { border-color: var(--accent-blue); }
.add-input::placeholder { color: var(--text-muted); }

/* ===== Stats Bar ===== */
.stats-bar {
  display: flex; gap: 12px; padding: 10px 20px;
  background: var(--bg-primary);
}
.stat-card {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}
.stat-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.stat-icon.blue { background: rgba(88,166,255,.12); }
.stat-icon.green { background: rgba(63,185,80,.12); }
.stat-icon.red { background: rgba(248,81,73,.12); }
.stat-icon.orange { background: rgba(210,153,34,.12); }
.stat-info { display: flex; flex-direction: column; }
.stat-value { font-size: 18px; font-weight: 700; font-family: 'Cascadia Code', monospace; }
.stat-label { font-size: 11px; color: var(--text-secondary); }

/* ===== Main Content ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 20px; }

/* ===== Table ===== */
.table-section { margin-top: 10px; }
.table-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.table-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); }

.table-wrap {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--bg-tertiary); padding: 8px 14px;
  font-size: 11px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: .5px;
  text-align: left; border-bottom: 1px solid var(--border);
}
/* 买入线/卖出线表头颜色标记 */
thead th.th-buy { color: var(--color-buy); }
thead th.th-sell { color: var(--color-sell); }

tbody td {
  padding: 8px 14px; font-size: 13px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: rgba(88,166,255,.04); }

.bullet-name {
  font-weight: 600; font-family: 'Cascadia Code', monospace;
}
.price-cell {
  font-family: 'Cascadia Code', monospace; font-weight: 600;
  color: var(--accent-orange);
}

/* 买入线/卖出线可点击单元格 */
.threshold-cell {
  cursor: pointer; font-family: 'Cascadia Code', monospace;
  transition: color .15s;
}
.threshold-cell:hover { text-decoration: underline; }
.threshold-cell.unset { color: var(--text-muted); font-style: italic; font-family: inherit; }
.threshold-cell.buy-line { color: var(--color-buy); }
.threshold-cell.sell-line { color: var(--color-sell); }

/* 状态标签 */
.status-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
}
.status-tag.waiting { background: var(--bg-tertiary); color: var(--text-muted); }
.status-tag.stable { background: rgba(63,185,80,.1); color: var(--accent-green); }
.status-tag.up { background: rgba(248,81,73,.1); color: var(--accent-red); }
.status-tag.down { background: rgba(88,166,255,.1); color: var(--accent-blue); }
.status-tag.buy_signal {
  background: var(--color-buy-bg); color: var(--color-buy);
  font-weight: 700; animation: flash-buy 1s infinite;
}
.status-tag.sell_signal {
  background: var(--color-sell-bg); color: var(--color-sell);
  font-weight: 700; animation: flash-sell 1s infinite;
}

@keyframes flash-buy {
  0%, 100% { opacity: 1; }
  50% { opacity: .6; }
}
@keyframes flash-sell {
  0%, 100% { opacity: 1; }
  50% { opacity: .6; }
}

.action-btn {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; padding: 4px; border-radius: 4px; font-size: 14px;
  transition: all .15s;
}
.action-btn:hover { color: var(--accent-red); background: rgba(248,81,73,.1); }

.empty-state {
  padding: 30px; text-align: center; color: var(--text-muted);
  font-size: 13px;
}

/* ===== Logs ===== */
.logs-section {
  flex: 1; display: flex; gap: 12px; margin: 10px 0;
  min-height: 0;
}
.log-panel {
  flex: 1; display: flex; flex-direction: column;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
  min-height: 0;
}
.log-header {
  padding: 8px 14px; font-size: 12px; font-weight: 600;
  background: var(--bg-tertiary); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.log-header .icon { font-size: 14px; }
.log-body {
  flex: 1; overflow-y: auto; padding: 8px 12px;
  font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 11px; line-height: 1.6;
}
.log-body::-webkit-scrollbar { width: 6px; }
.log-body::-webkit-scrollbar-track { background: transparent; }
.log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.log-entry { color: var(--text-secondary); }
.log-entry.error { color: var(--accent-red); }
.log-entry.warning { color: var(--accent-orange); }
.log-entry.buy { color: var(--color-buy); font-weight: 600; }
.log-entry.sell { color: var(--color-sell); font-weight: 600; }
.log-entry.critical { color: var(--accent-red); font-weight: 700; }

.alert-panel .log-header { color: var(--accent-orange); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; width: 340px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.modal h3 { font-size: 15px; margin-bottom: 12px; }
.modal h3.modal-buy { color: var(--color-buy); }
.modal h3.modal-sell { color: var(--color-sell); }
.modal input {
  width: 100%; background: var(--bg-primary); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; color: var(--text-primary);
  font-family: 'Cascadia Code', monospace; font-size: 14px;
  outline: none; margin-bottom: 14px;
}
.modal input:focus { border-color: var(--accent-blue); }
.modal input.input-buy:focus { border-color: var(--color-buy); }
.modal input.input-sell:focus { border-color: var(--color-sell); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal p.hint { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">⚡</span>
      <div class="title-group">
        <span class="title">子弹价格闪电监视 v3</span>
        <span class="subtitle" id="verInfo">webview · 子进程抓取 · 秒级刷新</span>
      </div>
    </div>
    <div id="statusBadge" class="status-badge status-idle">
      <span class="dot"></span>
      <span id="statusText">未启动</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button id="btnStart" class="btn btn-primary" onclick="doStart()">▶ 开始</button>
    <button id="btnStop" class="btn btn-danger" onclick="doStop()" disabled>⏸ 停止</button>
    <button class="btn" onclick="doTest()">🔔 测试</button>
    <div class="separator"></div>
    <div class="input-group">
      <label>间隔</label>
      <input id="intervalInput" type="number" value="10" min="1" max="60">
      <label>秒</label>
    </div>
    <div class="separator"></div>
    <input id="addInput" class="add-input" placeholder="输入子弹名称..." onkeydown="if(event.key==='Enter')doAdd()">
    <button class="btn btn-primary" onclick="doAdd()">➕ 添加</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon blue">📋</div>
      <div class="stat-info">
        <span id="statTotal" class="stat-value">0</span>
        <span class="stat-label">监控总数</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">💰</div>
      <div class="stat-info">
        <span id="statBuy" class="stat-value">0</span>
        <span class="stat-label">买入机会</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">🔥</div>
      <div class="stat-info">
        <span id="statSell" class="stat-value">0</span>
        <span class="stat-label">卖出机会</span>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">⏱</div>
      <div class="stat-info">
        <span id="statSpeed" class="stat-value">—</span>
        <span class="stat-label">响应速度</span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main">
    <!-- Bullet Table -->
    <div class="table-section">
      <div class="table-header">
        <span class="table-title">监控列表（点击买入线/卖出线可编辑）</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:22%">子弹名称</th>
              <th style="width:12%">当前价格</th>
              <th style="width:12%" class="th-buy">买入线 ↓</th>
              <th style="width:12%" class="th-sell">卖出线 ↑</th>
              <th style="width:30%">状态</th>
              <th style="width:12%; text-align:center">操作</th>
            </tr>
          </thead>
          <tbody id="bulletTableBody">
            <tr><td colspan="6" class="empty-state">暂无监控项，请添加子弹名称</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Logs -->
    <div class="logs-section">
      <div class="log-panel">
        <div class="log-header"><span class="icon">📝</span> 运行日志</div>
        <div id="logBody" class="log-body"></div>
      </div>
      <div class="log-panel alert-panel">
        <div class="log-header"><span class="icon">📊</span> 买卖信号</div>
        <div id="alertBody" class="log-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- Threshold Modal -->
<div id="thresholdModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">设置阈值</h3>
    <p id="modalHint" class="hint">设为 0 = 不检测</p>
    <input id="modalInput" type="number" min="0" placeholder="0"
           onkeydown="if(event.key==='Enter')confirmModal()">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="confirmModal()">确定</button>
    </div>
  </div>
</div>

<script>
// ========== State ==========
let _modalTarget = null;   // {name, type: 'buy'|'sell'}

// ========== API Bridge ==========
async function api(method, ...args) {
  if (window.pywebview && window.pywebview.api) {
    return await window.pywebview.api[method](...args);
  }
  console.warn('pywebview API not available, method:', method);
  return null;
}

// ========== Actions ==========
async function doStart() {
  const interval = parseInt(document.getElementById('intervalInput').value) || 3;
  await api('set_interval', interval);
  const ok = await api('start_monitor');
  if (ok) {
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled = false;
    setStatus('running', '运行中');
  }
}

async function doStop() {
  await api('stop_monitor');
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  setStatus('idle', '已停止');
}

async function doTest() {
  await api('test_notification');
  appendLog('[测试] 🔔 已发送测试通知');
}

async function doAdd() {
  const input = document.getElementById('addInput');
  const name = input.value.trim();
  if (!name) return;
  const ok = await api('add_bullet', name);
  if (ok) {
    input.value = '';
    refreshTable();
  } else {
    input.style.borderColor = 'var(--accent-red)';
    setTimeout(() => input.style.borderColor = '', 1000);
  }
}

async function doRemove(name) {
  await api('remove_bullet', name);
  refreshTable();
}

// ========== Modal ==========
function openThresholdModal(name, type, current) {
  _modalTarget = { name: name, type: type };
  const titleEl = document.getElementById('modalTitle');
  const hintEl = document.getElementById('modalHint');
  const inputEl = document.getElementById('modalInput');

  if (type === 'buy') {
    titleEl.textContent = name + ' — 买入线';
    titleEl.className = 'modal-buy';
    hintEl.textContent = '≤ 此价格时提醒买入，0 = 不检测';
    inputEl.className = 'input-buy';
  } else {
    titleEl.textContent = name + ' — 卖出线';
    titleEl.className = 'modal-sell';
    hintEl.textContent = '≥ 此价格时提醒卖出，0 = 不检测';
    inputEl.className = 'input-sell';
  }

  inputEl.value = current || 0;
  document.getElementById('thresholdModal').classList.add('active');
  setTimeout(() => inputEl.focus(), 100);
}

function closeModal() {
  document.getElementById('thresholdModal').classList.remove('active');
  _modalTarget = null;
}

async function confirmModal() {
  if (!_modalTarget) return;
  const val = parseInt(document.getElementById('modalInput').value) || 0;
  if (_modalTarget.type === 'buy') {
    await api('set_buy_threshold', _modalTarget.name, val);
  } else {
    await api('set_sell_threshold', _modalTarget.name, val);
  }
  closeModal();
  refreshTable();
}

// ========== UI Updates ==========
function setStatus(state, text) {
  const badge = document.getElementById('statusBadge');
  badge.className = 'status-badge status-' + state;
  document.getElementById('statusText').textContent = text;
}

function appendLog(msg) {
  const body = document.getElementById('logBody');
  const div = document.createElement('div');
  div.className = 'log-entry';
  if (msg.includes('❌')) div.className += ' error';
  else if (msg.includes('⚠')) div.className += ' warning';
  div.textContent = msg;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  while (body.children.length > 150) body.removeChild(body.firstChild);
}

function appendAlert(msg, level) {
  const body = document.getElementById('alertBody');
  const div = document.createElement('div');
  div.className = 'log-entry ' + (level || 'warning');
  div.textContent = msg;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  while (body.children.length > 150) body.removeChild(body.firstChild);
}

async function refreshTable() {
  const data = await api('get_status');
  if (!data) return;

  const tbody = document.getElementById('bulletTableBody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无监控项，请添加子弹名称</td></tr>';
    updateStats(data);
    return;
  }

  let html = '';
  for (const item of data) {
    const priceDisplay = item.price !== null ? item.price : '—';

    // 买入线
    const buyDisplay = item.buy_threshold > 0
      ? '<span class="threshold-cell buy-line" onclick="openThresholdModal(\'' + item.name + '\', \'buy\', ' + item.buy_threshold + ')">' + item.buy_threshold + '</span>'
      : '<span class="threshold-cell unset" onclick="openThresholdModal(\'' + item.name + '\', \'buy\', 0)">点击设置</span>';

    // 卖出线
    const sellDisplay = item.sell_threshold > 0
      ? '<span class="threshold-cell sell-line" onclick="openThresholdModal(\'' + item.name + '\', \'sell\', ' + item.sell_threshold + ')">' + item.sell_threshold + '</span>'
      : '<span class="threshold-cell unset" onclick="openThresholdModal(\'' + item.name + '\', \'sell\', 0)">点击设置</span>';

    html += '<tr>' +
      '<td class="bullet-name">' + item.name + '</td>' +
      '<td class="price-cell">' + priceDisplay + '</td>' +
      '<td>' + buyDisplay + '</td>' +
      '<td>' + sellDisplay + '</td>' +
      '<td><span class="status-tag ' + item.status + '">' + item.status_text + '</span></td>' +
      '<td style="text-align:center">' +
        '<button class="action-btn" onclick="doRemove(\'' + item.name + '\')" title="删除">✕</button>' +
      '</td>' +
    '</tr>';
  }
  tbody.innerHTML = html;
  updateStats(data);
}

function updateStats(data) {
  document.getElementById('statTotal').textContent = data.length;
  document.getElementById('statBuy').textContent = data.filter(d => d.status === 'buy_signal').length;
  document.getElementById('statSell').textContent = data.filter(d => d.status === 'sell_signal').length;
}

// ========== Callbacks from Python ==========
window.onPyLog = function(msg) { appendLog(msg); };
window.onPyAlert = function(msg, level) { appendAlert(msg, level); };
window.onPyUpdate = function() { refreshTable(); };
window.onPyStatusChange = function(state, text) {
  setStatus(state, text);
  if (state !== 'running') {
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled = true;
  }
};
window.onPySpeed = function(speed) {
  document.getElementById('statSpeed').textContent = speed;
};

// ========== Init ==========
window.addEventListener('pywebviewready', function() {
  refreshTable();
  api('get_version').then(v => {
    if (v) document.getElementById('verInfo').textContent = 'v' + v + ' · webview · 子进程抓取';
  });
  api('check_for_update').then(r => {
    try {
      var j = JSON.parse(r);
      if (j.status !== 'latest' && j.status !== 'dev' && j.message) {
        appendLog('[更新] ' + j.message);
      }
    } catch(e) {}
  });
});
setTimeout(() => refreshTable(), 500);
</script>
</body>
</html>
